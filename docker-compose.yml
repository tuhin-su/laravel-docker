services:
  php:
    image: docker.io/tuhinsu/laravel-psql:latest
    restart: unless-stopped
    container_name: ${PROJECT_NAME}-laravel
    hostname: ${PROJECT_NAME}
    userns_mode: keep-id
    user: vscode
    command: "sh -c '/start.sh'"
    volumes:
      - ./${PROJECT_NAME}:/${PROJECT_NAME}:Z
      - ./db_backups:/db_backup:ro
      - ./start.sh:/start.sh:ro
    working_dir: /${PROJECT_NAME}

    environment:
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: docker.io/postgis/postgis:17-master
    restart: unless-stopped
    container_name: ${PROJECT_NAME}-db
    hostname: ${PROJECT_NAME}-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      # - ./db_backups:/db_backup
      - ./db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
      
  pgadmin:
    image: docker.io/dpage/pgadmin4
    restart: unless-stopped
    container_name: ${PROJECT_NAME}-pgadmin
    hostname: ${PROJECT_NAME}-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: test@email.com
      PGADMIN_DEFAULT_PASSWORD: 123456
    volumes:
      - ./pgadmin:/var/lib/pgadmin
    ports:
     - "5050:80"
    depends_on:
      - db

  redis:
    image: docker.io/redis:latest
    restart: unless-stopped
    container_name: ${PROJECT_NAME}-redis
    hostname: ${PROJECT_NAME}-redis
    ports:
      - "6379:6379"